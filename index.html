<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziko Crypto - Elite AI v12.0 Sniper Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #000000; }
        .mobile-container { max-width: 400px; margin: 0 auto; background-color: #111520; min-height: 100vh; position: relative; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; display: flex; flex-direction: column; }
        .ai-pulse { animation: aiPulse 2s infinite; }
        @keyframes aiPulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .glass-panel { background-color: #24293f; border: 1px solid rgba(255, 255, 255, 0.02); }
        .text-neon-cyan { color: #00e7c5; }
        .bg-neon-cyan { background-color: #00e7c5; }
        .bg-neon-orange { background-color: #ffb703; }
        .text-panel-title { color: #aeb4c5; }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen bg-gray-900 py-0 sm:py-4">
    <div class="mobile-container w-full sm:shadow-2xl sm:rounded-xl overflow-hidden overflow-y-auto">

        <!-- نافذة المودال (المنبثقة) -->
        <div id="ziko-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-md">
            <div class="bg-gray-800 border border-gray-600 rounded-2xl w-full max-w-sm transform transition-all shadow-[0_0_50px_rgba(0,0,0,1)] text-center flex flex-col max-h-[90vh]">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900/50 rounded-t-2xl">
                    <div class="flex items-center gap-2">
                        <span id="modal-icon" class="text-2xl">🎯</span>
                        <h3 id="modal-title" class="text-base font-black text-white uppercase tracking-tighter">Title</h3>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-700 w-8 h-8 rounded-full flex items-center justify-center font-bold">✕</button>
                </div>
                <div id="modal-desc" class="p-4 text-sm text-gray-300 overflow-y-auto" dir="rtl"></div>
            </div>
        </div>

        <!-- الهيدر -->
        <div class="bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between sticky top-0 z-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-yellow-500 to-yellow-300 rounded-full flex items-center justify-center text-gray-900 font-bold text-lg shadow-lg relative">
                    Z
                    <div id="connection-status" class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-green-500 border-2 border-gray-800 ai-pulse"></div>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide text-white uppercase">ziko crypto</h1>
                    <p class="text-[10px] text-green-400 flex items-center gap-1 uppercase font-mono tracking-tighter">Sniper Elite V12.0</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition">⚙️</button>
        </div>

        <div class="p-4 flex-1 flex flex-col gap-4 overflow-y-auto pb-6">
            
            <!-- شريط الإشعارات الذكي -->
            <div class="bg-gray-800/80 border border-gray-700 rounded-full px-4 py-2 flex items-center gap-2 shadow-sm overflow-hidden mb-1">
                <span class="text-red-500 animate-pulse text-sm font-bold">NOTICE:</span>
                <marquee id="alert-marquee" class="text-[11px] text-gray-300 font-medium" direction="right" scrollamount="4">
                    جاري معايرة رادارات السيولة وفحص بصمات الحيتان... ⏳
                </marquee>
            </div>

            <!-- المؤشرات الأربعة العلوية -->
            <div class="grid grid-cols-4 gap-1.5 pb-1" dir="rtl">
                <div class="glass-panel rounded-xl p-2 flex flex-col items-center justify-center shadow-lg h-28 relative">
                    <span class="text-[7.5px] text-panel-title font-bold mb-3 z-10 text-center whitespace-nowrap">عقود الشراء (Longs)</span>
                    <div class="relative w-14 h-14 flex items-center justify-center">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path class="text-[#3b415a]" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" />
                            <path id="heat-svg-bar" class="text-neon-cyan transition-all duration-1000" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3.5" stroke-dasharray="0, 100" stroke-linecap="round" />
                        </svg>
                        <div id="heat-text-circle" class="absolute text-[11px] font-black text-white">--%</div>
                    </div>
                </div>

                <div class="glass-panel rounded-xl p-2 flex flex-col items-center justify-center shadow-lg h-28">
                    <span class="text-[8px] text-panel-title font-bold mb-3 z-10 text-center whitespace-nowrap">توازن السوق (AI)</span>
                    <div class="text-white font-black text-[17px] mb-2.5 tracking-wider"><span id="ai-index-val">--</span><span class="text-gray-400 text-sm">/100</span></div>
                    <div class="w-11/12 h-1.5 flex rounded-full relative items-center" dir="ltr">
                        <div id="ai-bar-cyan" class="h-full bg-neon-cyan rounded-l-full transition-all duration-1000" style="width: 50%;"></div>
                        <div id="ai-bar-orange" class="h-full bg-neon-orange rounded-r-full transition-all duration-1000" style="width: 50%;"></div>
                        <div id="ai-dot" class="absolute h-3 w-3 bg-[#24293f] rounded-full border-2 border-white top-1/2 -translate-y-1/2 transition-all duration-1000" style="left: 50%; transform: translate(-50%, -50%);"></div>
                    </div>
                </div>

                <div class="glass-panel rounded-xl p-2.5 flex flex-col items-center justify-center shadow-lg h-28 text-center">
                    <span class="text-[8px] text-panel-title font-bold mb-3 whitespace-nowrap">بريميوم أمريكا 🇺🇸</span>
                    <div id="cb-premium-val" class="text-neon-cyan font-black text-xs mb-1 tracking-wider">--</div>
                    <div class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter">COINBASE DIFF</div>
                </div>

                <div class="glass-panel rounded-xl p-2.5 flex flex-col items-center justify-center shadow-lg h-28 text-center">
                    <span class="text-[8px] text-panel-title font-bold mb-3 whitespace-nowrap">السيولة (Global) 🌊</span>
                    <div id="tri-vol-val" class="text-white font-black text-xs mb-1 tracking-wider">--</div>
                    <div class="text-[8px] text-gray-500 font-bold uppercase tracking-tighter">BILLION USD</div>
                </div>
            </div>

            <!-- قائمة الأسعار اللحظية -->
            <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-4 shadow-inner mt-2">
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <span class="font-bold text-white text-sm">BTC/USDT</span>
                        <span id="price-btc" class="font-mono text-sm text-green-400 font-bold">Loading..</span>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <span class="font-bold text-white text-sm">SUI/USDT</span>
                        <span id="price-sui" class="font-mono text-sm text-green-400 font-bold">Loading..</span>
                    </div>
                    <div class="flex justify-between items-center">
                        <span class="font-bold text-white text-sm">FET/USDT</span>
                        <span id="price-fet" class="font-mono text-sm text-green-400 font-bold">Loading..</span>
                    </div>
                </div>
            </div>

            <!-- الأزرار التفاعلية -->
            <div class="mt-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="checkLiquidity()" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-4 flex flex-col items-center text-center shadow-lg relative overflow-hidden group">
                        <div class="absolute inset-0 bg-blue-500/5 opacity-0 group-hover:opacity-100 transition"></div>
                        <span class="text-2xl mb-1 drop-shadow-md">💧</span>
                        <span class="font-black text-[10px] text-blue-400 uppercase tracking-widest">سيولة العملات</span>
                    </button>
                    <button onclick="alert('جارِ معايرة تتبع الحيتان...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-4 flex flex-col items-center text-center shadow-lg">
                        <span class="text-2xl mb-1 drop-shadow-md">🐋</span>
                        <span class="font-black text-[10px] text-indigo-400 uppercase tracking-widest">تتبع الحيتان</span>
                    </button>
                    <button onclick="alert('جارِ معايرة رادار الانفجار...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-4 flex flex-col items-center text-center shadow-lg">
                        <span class="text-2xl mb-1 drop-shadow-md">💥</span>
                        <span class="font-black text-[10px] text-yellow-500 uppercase tracking-widest">قيد الانفجار</span>
                    </button>
                    <button onclick="alert('جارِ معايرة رادار الصيد...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-4 flex flex-col items-center text-center shadow-lg">
                        <span class="text-2xl mb-1 drop-shadow-md">🎯</span>
                        <span class="font-black text-[10px] text-red-400 uppercase tracking-widest">رادار الصيد</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // دوال المودال الأساسية
        function openModal(title, desc, icon) { 
            document.getElementById('modal-title').innerText = title; 
            document.getElementById('modal-desc').innerHTML = desc; 
            document.getElementById('modal-icon').innerText = icon; 
            document.getElementById('ziko-modal').classList.remove('hidden'); 
        }
        function closeModal() { document.getElementById('ziko-modal').classList.add('hidden'); }
        function copySignal(text) { navigator.clipboard.writeText(text).then(() => { alert("✅ تم نسخ بيانات الهدف!"); }); }

        // محرك الجلب الذكي
        async function smartFetch(url) { 
            try { 
                const res = await fetch(url, { cache: "no-store" }); 
                if(!res.ok) return null;
                return await res.json(); 
            } catch(e) { return null; } 
        }

        // WebSocket للأسعار الحية
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/suiusdt@trade/fetusdt@trade');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const symbol = data.s.replace('USDT','').toLowerCase();
            const el = document.getElementById('price-' + symbol);
            if(el) el.innerText = '$' + parseFloat(data.p).toLocaleString();
        };

        // 🎯 محرك Ziko Sniper V12 (لاصطياد التجميع قبل الانفجار)
        async function checkLiquidity() {
            openModal('📡 رادار التجميع الذكي', '<div class="text-center text-neon-cyan animate-pulse mt-10 mb-10 text-lg">جاري تحليل بصمات "السيولة الذكية"... ⏳</div>', '🎯');
            const data = await smartFetch('https://api.binance.com/api/v3/ticker/24hr');
            if(!data) return;

            const prePumpCoins = data
                .filter(i => {
                    const vol = parseFloat(i.quoteVolume);
                    const change = parseFloat(i.priceChangePercent);
                    return i.symbol.endsWith('USDT') && vol > 20000000 && change >= 0.2 && change <= 3.2;
                })
                .sort((a, b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))
                .slice(0, 4);

            if (prePumpCoins.length === 0) {
                openModal('رادار القنص', '<div class="text-center text-gray-400 p-8">البحث جاري... السيولة منتشرة بشكل طبيعي ولا يوجد تجميع مريب حالياً.</div>', '🔍');
                return;
            }

            let html = `<div class="space-y-4 pb-2" dir="rtl">`;
            prePumpCoins.forEach(coin => {
                const name = coin.symbol.replace('USDT', '');
                const vol = (parseFloat(coin.quoteVolume) / 1e6).toFixed(1);
                const price = parseFloat(coin.lastPrice);
                const chargeLevel = Math.min(98, (vol / 10) + 40).toFixed(0);

                html += `
                    <div class="glass-panel border border-gray-700 rounded-2xl p-4 relative overflow-hidden">
                        <div class="absolute top-0 right-0 w-1 h-full bg-neon-cyan"></div>
                        <div class="flex justify-between items-center mb-4">
                            <h3 class="text-white text-2xl font-black tracking-tighter">${name}</h3>
                            <div class="text-neon-cyan font-bold text-lg font-mono">$${price}</div>
                        </div>
                        <div class="grid grid-cols-2 gap-4 mb-4">
                            <div class="bg-black/30 p-2 rounded-xl text-center"><span class="text-[9px] text-gray-500 block">تدفق السيولة</span><span class="text-white font-bold">$${vol}M</span></div>
                            <div class="bg-black/30 p-2 rounded-xl text-center"><span class="text-[9px] text-gray-500 block">التغير اللحظي</span><span class="text-green-400 font-bold">+${parseFloat(coin.priceChangePercent).toFixed(2)}%</span></div>
                        </div>
                        <div class="space-y-1">
                            <div class="flex justify-between text-[9px] font-bold uppercase"><span class="text-neon-cyan">مستوى الشحن</span><span class="text-white">${chargeLevel}%</span></div>
                            <div class="w-full h-2 bg-gray-800 rounded-full p-0.5"><div class="h-full bg-neon-cyan rounded-full" style="width: ${chargeLevel}%"></div></div>
                        </div>
                        <button onclick="copySignal('Sniper Entry: ${name} @ $${price}')" class="w-full mt-4 py-2 bg-white/5 border border-white/10 rounded-xl text-white text-[10px] font-black uppercase tracking-widest">نسخ بيانات الهدف 📋</button>
                    </div>`;
            });
            html += `</div>`;
            openModal('رادار السيولة الذكية', html, '📡');
        }

        // محرك التحديث الدوري للمؤشرات
        async function updateDashboard() {
            const marquee = document.getElementById('alert-marquee');
            
            // 1. كوين بيس بريميوم
            const cbRes = await smartFetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
            const bnRes = await smartFetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            let premium = 0;
            if(cbRes && bnRes) {
                premium = parseFloat(cbRes.data.amount) - parseFloat(bnRes.price);
                const pEl = document.getElementById('cb-premium-val');
                pEl.innerText = (premium >= 0 ? '+' : '-') + '$' + Math.abs(premium).toFixed(1);
                pEl.className = premium >= 0 ? "text-neon-cyan font-black text-xs" : "text-red-500 font-black text-xs";
            }

            // 2. توازن السوق والسيولة
            const tickerRes = await smartFetch('https://api.binance.com/api/v3/ticker/24hr');
            let volBillion = 0;
            if(tickerRes) {
                const usdtPairs = tickerRes.filter(i => i.symbol.endsWith('USDT'));
                volBillion = ((usdtPairs.reduce((s, p) => s + parseFloat(p.quoteVolume), 0) * 2.5) / 1e9).toFixed(2);
                document.getElementById('tri-vol-val').innerText = `$${volBillion}B`;
                
                const pos = usdtPairs.sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume)).slice(0, 100).filter(i => parseFloat(i.priceChangePercent) > 0).length;
                document.getElementById('ai-index-val').innerText = pos;
                document.getElementById('ai-bar-cyan').style.width = pos + '%';
                document.getElementById('ai-bar-orange').style.width = (100 - pos) + '%';
                document.getElementById('ai-dot').style.left = pos + '%';
            }

            // 3. نسبة العقود (Longs)
            const fRes = await smartFetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=5m&limit=1');
            let longs = 50;
            if(fRes && fRes.length > 0) {
                longs = (parseFloat(fRes[0].longAccount) * 100).toFixed(0);
                document.getElementById('heat-text-circle').innerText = longs + '%';
                document.getElementById('heat-svg-bar').setAttribute('stroke-dasharray', `${longs}, 100`);
            }

            // محرك الإشعارات الذكي
            if (premium > 20) marquee.innerHTML = `<span class="text-green-400">🔥 تنبيه: حيتان أمريكا يشترون الآن بعلاوة +$${premium.toFixed(1)}.. صعود مؤسساتي متوقع!</span>`;
            else if (longs > 62) marquee.innerHTML = `<span class="text-yellow-500">⚠️ خطر: تضخم في عقود الشراء (${longs}%).. احتمالية عالية لتصفية (Long Squeeze)!</span>`;
            else marquee.innerHTML = `⚖️ حالة السوق: السيولة مستقرة ($${volBillion}B) والفروقات السعرية طبيعية.. استعد لاصطياد الفرص.`;
        }

        setInterval(updateDashboard, 15000);
        updateDashboard();
    </script>
</body>
</html>
