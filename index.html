<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziko Crypto - Elite AI v9.0 Tri-Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #000000; }
        .mobile-container { max-width: 400px; margin: 0 auto; background-color: #111520; min-height: 100vh; position: relative; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; display: flex; flex-direction: column; }
        .ai-pulse { animation: aiPulse 2s infinite; }
        @keyframes aiPulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
        .glass-panel { background-color: #24293f; border: 1px solid rgba(255, 255, 255, 0.02); }
        .text-neon-cyan { color: #00e7c5; }
        .bg-neon-cyan { background-color: #00e7c5; }
        .bg-neon-orange { background-color: #ffb703; }
        .text-panel-title { color: #aeb4c5; }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen bg-gray-900 py-0 sm:py-4">
    <div class="mobile-container w-full sm:shadow-2xl sm:rounded-xl overflow-hidden overflow-y-auto">

        <!-- الهيدر -->
        <div class="bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between sticky top-0 z-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-yellow-500 to-yellow-300 rounded-full flex items-center justify-center text-gray-900 font-bold text-lg shadow-lg relative">
                    Z
                    <div id="connection-status" class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-green-500 border-2 border-gray-800 ai-pulse"></div>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide text-white">ziko crypto</h1>
                    <p class="text-[10px] text-green-400 flex items-center gap-1 uppercase font-mono">Aggregator V9.0 Online</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition">⚙️</button>
        </div>

        <div class="p-4 flex-1 flex flex-col gap-4 overflow-y-auto pb-6">
            
            <!-- شريط الأخبار اللحظي -->
            <div class="bg-gray-800/80 border border-gray-700 rounded-full px-4 py-2 flex items-center gap-2 shadow-sm overflow-hidden mb-1">
                <span class="text-red-500 animate-pulse text-sm">🔥</span>
                <marquee id="alert-marquee" class="text-[11px] text-gray-300 font-medium" direction="right" scrollamount="4">
                    اتصال مشفر ومباشر مع سيرفرات Coinbase و Binance... ⏳
                </marquee>
            </div>

            <!-- المؤشرات الاحترافية الأربعة (التصميم القديم بمحركات جديدة) -->
            <div class="grid grid-cols-4 gap-1.5 pb-1" dir="rtl">
                
                <!-- 1. حرارة العقود (الدائرة) -->
                <div class="glass-panel rounded-xl p-2.5 flex flex-col items-center justify-center shadow-lg relative h-28">
                    <span class="text-[8px] text-panel-title font-bold mb-3 z-10 text-center flex items-center gap-1 whitespace-nowrap">عقود الشراء (Longs)</span>
                    <div class="relative w-16 h-16 flex items-center justify-center z-10 mt-1">
                        <svg class="w-full h-full transform -rotate-90" viewBox="0 0 36 36">
                            <path class="text-[#3b415a]" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="currentColor" stroke-width="3" stroke-dasharray="100, 100" />
                            <path id="heat-svg-bar" class="text-blue-500 transition-all duration-1000" d="M18 2.0845 a 15.9155 15.9155 0 0 1 0 31.831 a 15.9155 15.9155 0 0 1 0 -31.831" fill="none" stroke="url(#heat-grad-perfect)" stroke-width="3.5" stroke-dasharray="0, 100" stroke-linecap="round" />
                            <defs>
                                <linearGradient id="heat-grad-perfect" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#ff4747" />
                                    <stop offset="50%" stop-color="#ffb703" />
                                    <stop offset="100%" stop-color="#00e7c5" />
                                </linearGradient>
                            </defs>
                        </svg>
                        <div id="heat-text-circle" class="absolute text-[13px] font-black text-white">--%</div>
                    </div>
                </div>

                <!-- 2. توازن السوق (الشريط) -->
                <div class="glass-panel rounded-xl p-2 flex flex-col items-center justify-center shadow-lg h-28">
                    <span class="text-[8px] text-panel-title font-bold mb-3 z-10 text-center whitespace-nowrap overflow-hidden text-ellipsis w-full">توازن السوق (AI)</span>
                    <div class="text-white font-black text-[17px] mb-2.5 tracking-wider"><span id="ai-index-val">--</span><span class="text-gray-400 text-sm">/100</span></div>
                    <div class="w-11/12 h-1.5 flex rounded-full relative items-center" dir="ltr">
                        <div id="ai-bar-cyan" class="h-full bg-neon-cyan rounded-l-full transition-all duration-1000" style="width: 50%;"></div>
                        <div id="ai-bar-orange" class="h-full bg-neon-orange rounded-r-full transition-all duration-1000" style="width: 50%;"></div>
                        <div id="ai-dot" class="absolute h-3 w-3 bg-[#24293f] rounded-full border-2 border-white top-1/2 -translate-y-1/2 transition-all duration-1000" style="left: 50%; transform: translate(-50%, -50%);"></div>
                    </div>
                </div>

                <!-- 3. بريميوم كوين بيس 🇺🇸 -->
                <div class="glass-panel rounded-xl p-2.5 flex flex-col items-center justify-center shadow-lg h-28 text-center">
                    <span class="text-[8px] text-panel-title font-bold mb-3 whitespace-nowrap">بريميوم أمريكا 🇺🇸</span>
                    <div id="cb-premium-val" class="text-neon-cyan font-black text-sm mb-1 tracking-wider">--</div>
                    <div class="text-[9px] text-gray-400 font-bold flex items-center justify-center gap-0.5">
                        فارق السعر (BTC)
                    </div>
                </div>

                <!-- 4. السيولة اللحظية (Tri-Volume) -->
                <div class="glass-panel rounded-xl p-2.5 flex flex-col items-center justify-center shadow-lg h-28 text-center">
                    <span class="text-[8px] text-panel-title font-bold mb-3 whitespace-nowrap">السيولة (24h)</span>
                    <div id="tri-vol-val" class="text-white font-black text-sm mb-1 tracking-wider">--</div>
                    <div id="vol-change-container" class="text-[9px] text-gray-400 font-bold flex items-center justify-center gap-0.5">
                        مليار دولار
                    </div>
                </div>

            </div>

            <!-- قائمة المراقبة اللحظية -->
            <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-4 shadow-inner mt-2">
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">BTC</span></div>
                        <div class="text-green-400 text-xs tracking-widest w-1/3 text-center opacity-70">▃▅▆▇</div>
                        <div class="text-left w-1/3"><span id="price-btc" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">SUI</span></div>
                        <div class="text-green-400 text-xs tracking-widest w-1/3 text-center opacity-70">▂▄▆▇</div>
                        <div class="text-left w-1/3"><span id="price-sui" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">FET</span></div>
                        <div class="text-red-400 text-xs tracking-widest w-1/3 text-center opacity-70">▇▆▄▂</div>
                        <div class="text-left w-1/3"><span id="price-fet" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                </div>
            </div>

            <!-- الأزرار السفلية (للمعايرة) -->
            <div class="mt-4">
                <div class="grid grid-cols-2 gap-3">
                    <button onclick="alert('زر السيولة: في انتظار أمرك للبرمجة...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-3 flex flex-col items-center text-center"><span class="text-2xl mb-1 drop-shadow-md">💧</span><span class="font-bold text-xs text-blue-400">سيولة العملات</span></button>
                    <button onclick="alert('زر الحيتان: في انتظار أمرك للبرمجة...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-3 flex flex-col items-center text-center shadow-[0_0_15px_rgba(99,102,241,0.2)]"><span class="text-2xl mb-1 drop-shadow-md">🐋</span><span class="font-bold text-xs text-indigo-400">الحيتان (الخبير)</span></button>
                    <button onclick="alert('زر الانفجار: في انتظار أمرك للبرمجة...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-3 flex flex-col items-center text-center"><span class="text-2xl mb-1 drop-shadow-md">💥</span><span class="font-bold text-xs text-yellow-500">قيد الانفجار</span></button>
                    <button onclick="alert('زر رادار الصيد: في انتظار أمرك للبرمجة...')" class="bg-gray-800 border border-gray-700 hover:bg-gray-700 transition rounded-xl p-3 flex flex-col items-center text-center relative overflow-hidden group"><div class="absolute inset-0 bg-red-500/10 opacity-0 group-hover:opacity-100 transition"></div><span class="text-2xl mb-1 drop-shadow-md">🎯</span><span class="font-bold text-xs text-red-400">رادار الصيد</span></button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // دالة جلب سريعة (بدون كاش) لضمان البيانات الحية
        async function smartFetch(url) { 
            try { 
                const res = await fetch(url, { cache: "no-store" }); 
                if(!res.ok) return null;
                return await res.json(); 
            } catch(e) { 
                return null; 
            } 
        }

        // الأسعار المباشرة WebSocket
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/suiusdt@trade/fetusdt@trade');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const symbol = data.s.replace('USDT','').toLowerCase();
            const el = document.getElementById('price-' + symbol);
            if(el) el.innerText = '$' + parseFloat(data.p).toLocaleString();
        };

        // المحرك الجديد للمؤشرات الأربعة (V9.0)
        async function updateDashboardIndicators() {
            
            // 1. بريميوم كوين بيس 🇺🇸 (يقارن السعر بين أمريكا وباينانس)
            const cbRes = await smartFetch('https://api.coinbase.com/v2/prices/BTC-USD/spot');
            const bnRes = await smartFetch('https://api.binance.com/api/v3/ticker/price?symbol=BTCUSDT');
            
            if(cbRes && bnRes) {
                const cbPrice = parseFloat(cbRes.data.amount);
                const bnPrice = parseFloat(bnRes.price);
                const premium = cbPrice - bnPrice;
                
                const premiumEl = document.getElementById('cb-premium-val');
                premiumEl.innerText = premium >= 0 ? `+$${premium.toFixed(1)}` : `-$${Math.abs(premium).toFixed(1)}`;
                premiumEl.className = premium >= 0 ? "text-neon-cyan font-black text-sm mb-1 tracking-wider" : "text-red-500 font-black text-sm mb-1 tracking-wider";
                
                // تحديث الماركيز بناءً على شراء الأمريكان
                const marquee = document.getElementById('alert-marquee');
                if(premium > 10) marquee.innerText = `🔥 المؤسسات الأمريكية (Coinbase) تشتري البيتكوين بعلاوة سعرية! سيطرة شرائية قوية..`;
                else if(premium < -10) marquee.innerText = `🩸 ضغط بيعي من أمريكا! سعر البيتكوين في Coinbase أقل من السوق العالمي..`;
                else marquee.innerText = `⚖️ استقرار في فروقات الأسعار بين المنصات العالمية (Binance - Coinbase)..`;
            }

            // 2. توازن السوق والسيولة اللحظية
            const tickerRes = await smartFetch('https://api.binance.com/api/v3/ticker/24hr');
            if(tickerRes) {
                const usdtPairs = tickerRes.filter(i => i.symbol.endsWith('USDT'));
                
                // السيولة اللحظية (بليون دولار)
                const totalVol = usdtPairs.reduce((sum, p) => sum + parseFloat(p.quoteVolume), 0);
                document.getElementById('tri-vol-val').innerText = `$${(totalVol / 1e9).toFixed(2)}B`;
                
                // توازن السوق AI
                usdtPairs.sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume));
                const top100 = usdtPairs.slice(0, 100);
                const positiveCoins = top100.filter(i => parseFloat(i.priceChangePercent) > 0).length;
                
                document.getElementById('ai-index-val').innerText = positiveCoins;
                document.getElementById('ai-bar-cyan').style.width = `${positiveCoins}%`;
                document.getElementById('ai-bar-orange').style.width = `${100 - positiveCoins}%`;
                document.getElementById('ai-dot').style.left = `${positiveCoins}%`;
            }

            // 3. حرارة العقود الآجلة (Longs Ratio من باينانس فيوتشرز)
            const lsRes = await smartFetch('https://fapi.binance.com/futures/data/globalLongShortAccountRatio?symbol=BTCUSDT&period=5m&limit=1');
            if(lsRes && lsRes.length > 0) {
                const longs = (parseFloat(lsRes[0].longAccount) * 100).toFixed(0);
                document.getElementById('heat-text-circle').innerText = longs + '%';
                document.getElementById('heat-svg-bar').setAttribute('stroke-dasharray', `${longs}, 100`);
            }
        }

        // تشغيل فوري وتحديث كل 15 ثانية
        setTimeout(updateDashboardIndicators, 500);
        setInterval(updateDashboardIndicators, 15000);

    </script>
</body>
</html>
