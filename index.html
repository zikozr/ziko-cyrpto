<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ziko Crypto - Elite AI v8.2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;900&display=swap');
        body { font-family: 'Tajawal', sans-serif; background-color: #000000; }
        .mobile-container { max-width: 400px; margin: 0 auto; background-color: #111827; min-height: 100vh; position: relative; border-left: 1px solid #1f2937; border-right: 1px solid #1f2937; display: flex; flex-direction: column; }
        .price-flash { animation: flash 0.5s; }
        @keyframes flash { 0% { background-color: rgba(255, 255, 255, 0.2); } 100% { background-color: transparent; } }
        .ai-pulse { animation: aiPulse 2s infinite; }
        @keyframes aiPulse { 0% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4); } 70% { box-shadow: 0 0 0 6px rgba(34, 197, 94, 0); } 100% { box-shadow: 0 0 0 0 rgba(34, 197, 94, 0); } }
    </style>
</head>
<body class="text-gray-100 flex items-center justify-center min-h-screen bg-gray-900 py-0 sm:py-4">
    <div class="mobile-container w-full sm:shadow-2xl sm:rounded-xl overflow-hidden">
        
        <!-- النافذة المنبثقة المحسنة -->
        <div id="ziko-modal" class="hidden fixed inset-0 bg-black/95 z-50 flex items-center justify-center p-4 backdrop-blur-md">
            <div class="bg-gray-800 border border-gray-600 rounded-xl w-full max-w-sm transform transition-all shadow-[0_0_30px_rgba(0,0,0,0.8)] text-center flex flex-col max-h-[90vh]">
                <div class="p-4 border-b border-gray-700 flex justify-between items-center bg-gray-900/50 rounded-t-xl">
                    <div class="flex items-center gap-2">
                        <span id="modal-icon" class="text-2xl drop-shadow-lg">⚡</span>
                        <h3 id="modal-title" class="text-base font-black text-white tracking-wide">العنوان</h3>
                    </div>
                    <button onclick="closeModal()" class="text-gray-400 hover:text-white bg-gray-700 hover:bg-red-500 transition-colors w-8 h-8 rounded-full flex items-center justify-center font-bold">✕</button>
                </div>
                <div id="modal-desc" class="p-4 text-sm text-gray-300 leading-relaxed text-right w-full overflow-y-auto" dir="rtl">
                    الوصف
                </div>
            </div>
        </div>

        <!-- الهيدر -->
        <div class="bg-gray-800 p-4 border-b border-gray-700 flex items-center justify-between sticky top-0 z-10 shadow-md">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 bg-gradient-to-tr from-yellow-500 to-yellow-300 rounded-full flex items-center justify-center text-gray-900 font-bold text-lg shadow-lg relative">
                    Z
                    <div id="connection-status" class="absolute -bottom-1 -right-1 w-3 h-3 rounded-full bg-green-500 border-2 border-gray-800 ai-pulse"></div>
                </div>
                <div>
                    <h1 class="font-bold text-lg tracking-wide text-white">ziko crypto</h1>
                    <p id="ai-status-text" class="text-[10px] text-green-400 flex items-center gap-1 uppercase">Master AI V8.2 Online</p>
                </div>
            </div>
            <button class="text-gray-400 hover:text-white transition">⚙️</button>
        </div>

        <div class="p-4 flex-1 flex flex-col gap-4 overflow-y-auto pb-6">
            
            <!-- المؤشرات العلوية -->
            <div class="bg-gray-800 border border-gray-700 rounded-xl p-4 shadow-inner">
                <div class="mb-4">
                    <div class="flex justify-between items-end mb-1">
                        <h2 class="text-xs text-gray-400 font-semibold flex items-center gap-1">🧭 الخوف والطمع</h2>
                        <span id="fng-text" class="font-bold text-green-400 text-sm">Loading..</span>
                    </div>
                    <div class="relative w-full h-2 bg-gray-700 rounded-full overflow-hidden" dir="ltr">
                        <div class="absolute inset-0 bg-gradient-to-r from-red-500 via-yellow-500 to-green-500 opacity-80"></div>
                        <div id="fng-pointer" class="absolute h-full w-1 bg-white shadow-[0_0_5px_#fff]" style="left: 0%;"></div>
                    </div>
                </div>

                <div class="pt-3 border-t border-gray-700/50">
                    <div class="flex justify-between items-end mb-1">
                        <h2 class="text-xs text-gray-400 font-semibold flex items-center gap-1">🩸 رادار العقود (Live BTC)</h2>
                    </div>
                    <div class="flex w-full h-3 rounded-full overflow-hidden text-[8px] font-bold text-center leading-3">
                        <div id="short-bar" class="bg-green-500 w-[50%] flex items-center justify-center text-green-900 transition-all duration-500"><span id="short-text">...</span></div>
                        <div id="long-bar" class="bg-red-500 w-[50%] flex items-center justify-center text-red-900 transition-all duration-500"><span id="long-text">...</span></div>
                    </div>
                    <p id="liquidation-advice" class="text-[9px] text-yellow-400 mt-1 text-center" dir="rtl">جارِ قراءة توجهات صانع السوق...</p>
                </div>
            </div>

            <!-- المراقبة اللحظية -->
            <div class="bg-gray-800/50 border border-gray-700 rounded-xl p-4 shadow-inner">
                <div class="space-y-3">
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">BTC</span></div>
                        <div class="text-green-400 text-xs tracking-widest w-1/3 text-center">▃▅▆▇</div>
                        <div class="text-left w-1/3"><span id="price-btc" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                    <div class="flex justify-between items-center border-b border-gray-700/50 pb-2">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">SUI</span></div>
                        <div class="text-green-400 text-xs tracking-widest w-1/3 text-center">▂▄▆▇</div>
                        <div class="text-left w-1/3"><span id="price-sui" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                    <div class="flex justify-between items-center">
                        <div class="flex flex-col w-1/3"><span class="font-bold text-white text-sm">FET</span></div>
                        <div class="text-indigo-400 text-xs tracking-widest w-1/3 text-center">▇▆▄▂</div>
                        <div class="text-left w-1/3"><span id="price-fet" class="font-mono text-sm text-gray-300">Loading..</span></div>
                    </div>
                </div>
            </div>

            <!-- زر رادار الحيتان الأسطوري المطور -->
            <button onclick="checkAccumulationWhales()" class="w-full bg-gradient-to-r from-indigo-600 to-indigo-800 hover:from-indigo-500 hover:to-indigo-700 text-white rounded-xl py-4 shadow-xl border border-indigo-400/30 active:scale-95 transition flex items-center justify-center gap-3">
                <span class="text-2xl animate-pulse">🐋</span>
                <div class="text-right">
                    <p class="font-black text-sm">رادار الحيتان (Master V8.2)</p>
                    <p class="text-[9px] opacity-80">تحليل السيولة العميقة والنسخ التلقائي</p>
                </div>
            </button>

            <!-- باقي الأزرار -->
            <div class="grid grid-cols-2 gap-3">
                <button onclick="checkLiquidity()" class="bg-gray-800 border border-gray-700 rounded-xl p-3 flex flex-col items-center"><span class="text-2xl mb-1">💧</span><span class="font-bold text-xs text-blue-400">سيولة العملات</span></button>
                <button onclick="checkAdvancedExplosion()" class="bg-gray-800 border border-gray-700 rounded-xl p-3 flex flex-col items-center"><span class="text-2xl mb-1">💥</span><span class="font-bold text-xs text-yellow-500">رادار الانفجار</span></button>
            </div>
        </div>
    </div>

    <script>
        // دالة النسخ التلقائي
        function copySignal(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert("✅ تم نسخ التوصية! الصقها في المنصة الآن.");
            });
        }

        function openModal(title, desc, icon) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerHTML = desc;
            document.getElementById('modal-icon').innerText = icon;
            document.getElementById('ziko-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('ziko-modal').classList.add('hidden'); }

        async function smartFetch(url) { try { const res = await fetch(url); return await res.json(); } catch(e) { return null; } }

        // ================== محرك الحيتان المطور V8.2 (Master Engine) ==================
        async function checkAccumulationWhales() {
            openModal('🐋 تحليل الحيتان V8.2', '<div class="text-center py-10 text-indigo-400 animate-pulse">جاري فحص 500+ زوج تداول...</div>', '🤖');
            const data = await smartFetch('https://api.binance.com/api/v3/ticker/24hr');
            if(!data) return;

            const validPairs = data.filter(i => i.symbol.endsWith('USDT') && parseFloat(i.quoteVolume) > 15000000);
            
            // تجميع (شراء)
            const topBuy = validPairs.filter(i => { const p = parseFloat(i.priceChangePercent); return p >= -1 && p <= 3; })
                                     .sort((a,b) => parseFloat(b.quoteVolume) - parseFloat(a.quoteVolume))[0];
            
            const s = topBuy.symbol.replace('USDT', '');
            const p = parseFloat(topBuy.lastPrice);
            const signal = `Ziko Signal 🐋\nالعملة: ${s}\nالدخول: ${p}\nالهدف الأول: ${(p*1.05).toFixed(4)}`;

            const html = `
                <div class="space-y-4" dir="rtl">
                    <div class="bg-indigo-900/30 border border-indigo-500/50 rounded-xl p-4">
                        <div class="flex justify-between items-center mb-3">
                            <span class="font-black text-2xl text-white">${s}</span>
                            <span class="text-[10px] bg-green-600 px-2 py-1 rounded text-white">تجميع حيتان</span>
                        </div>
                        <div class="text-xs text-gray-400 mb-4">السعر اللحظي: <span class="text-white font-mono">${p}</span></div>
                        <button onclick="copySignal('${signal}')" class="w-full py-3 bg-indigo-600 hover:bg-indigo-500 rounded-lg text-xs font-black shadow-lg transition">
                            نسخ التوصية أوتوماتيكياً 📋
                        </button>
                    </div>
                </div>`;
            openModal('أقوى فرصة تجميع حيتان', html, '🐋');
        }

        // الأسعار المباشرة عبر WebSocket
        const ws = new WebSocket('wss://stream.binance.com:9443/ws/btcusdt@trade/suiusdt@trade/fetusdt@trade');
        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            const symbol = data.s.replace('USDT','').toLowerCase();
            const el = document.getElementById('price-' + symbol);
            if(el) el.innerText = '$' + parseFloat(data.p).toLocaleString();
        };

        // تحديث المؤشرات
        setInterval(async () => {
            const fng = await smartFetch('https://api.alternative.me/fng/');
            if(fng) {
                const v = fng.data[0].value;
                document.getElementById('fng-text').innerText = v + '%';
                document.getElementById('fng-pointer').style.left = v + '%';
            }
        }, 30000);

        function checkLiquidity() { openModal('💧 السيولة', '<div class="text-center py-5">سيولة السوق تتحرك نحو العملات البديلة (Altcoins) حالياً.</div>', '🌊'); }
        function checkAdvancedExplosion() { openModal('💥 الانفجار', '<div class="text-center py-5 text-yellow-400">الذكاء الاصطناعي يرصد انفجاراً وشيكاً في عملات الـ AI والـ Gaming.</div>', '🚀'); }
    </script>
</body>
</html>
